name: Andrea Daily Leads

on:
  schedule:
    - cron: "0 12 * * 1-5"   # 06:00 CST (UTC-6) = 12:00 UTC  (07:00 during CDT/summer)
  workflow_dispatch:           # allows manual run from GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install slack-sdk anthropic

      - name: Run daily leads job
        run: python andrea_daily_leads_job.py --channel C09K7UDJE1G
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
